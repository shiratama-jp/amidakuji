<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>運試し！きめようらんど</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#fde68a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="きめようらんど">
    <link rel="apple-touch-icon" href="./icons/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sky: #c8eaff;
            --bg-grass: #a8d890;
            --text-main: #4a8a30;
            --card-yellow: #fff9c4;
            --card-blue: #e3f2fd;
            --card-pink: #fce4ec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            background: var(--bg-sky);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .meadow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to bottom, #d8f0d0 0%, var(--bg-grass) 100%);
            z-index: -1;
            border-radius: 50% 50% 0 0 / 10% 10% 0 0;
            transform: scaleX(1.2);
        }

        .clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -2;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.7;
            animation: move-cloud linear infinite;
        }

        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud-1 { width: 100px; height: 40px; top: 10%; left: -150px; animation-duration: 40s; }
        .cloud-1::before { width: 50px; height: 50px; top: -20px; left: 15px; }
        .cloud-1::after { width: 40px; height: 40px; top: -15px; left: 45px; }

        .cloud-2 { width: 120px; height: 45px; top: 25%; left: -180px; animation-duration: 55s; animation-delay: -10s; }
        .cloud-2::before { width: 60px; height: 60px; top: -25px; left: 20px; }
        .cloud-2::after { width: 50px; height: 50px; top: -20px; left: 55px; }

        @keyframes move-cloud {
            from { transform: translateX(-100px); }
            to { transform: translateX(calc(100vw + 200px)); }
        }

        header {
            margin-top: 5vh;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(24px, 7vw, 38px);
            font-weight: 900;
            color: var(--text-main);
            text-shadow: 3px 3px 0 white;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: clamp(14px, 4vw, 18px);
            font-weight: 700;
            color: #6a9a50;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
            margin-top: 20px;
        }

        .menu-item {
            text-decoration: none;
            background: white;
            border-radius: 24px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 0 rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 4px solid white;
        }

        .menu-item:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
        }

        .menu-item.yellow { background: var(--card-yellow); border-color: #fdd835; }
        .menu-item.orange { background: #fff3e0; border-color: #ffb74d; }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
        }

        .item-title {
            font-size: 16px;
            font-weight: 900;
            color: #444;
            text-align: center;
            line-height: 1.2;
        }

        footer {
            margin-top: auto;
            padding: 16px 0 20px;
            font-size: 12px;
            color: #777;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .copyright {
            font-size: 11px;
            color: #aaa;
        }

        .btn-qr {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 15px;
            font-weight: 900;
            color: white;
            background: #4ade80;
            border: none;
            border-radius: 30px;
            padding: 10px 24px;
            cursor: pointer;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
            margin-top: 12px;
            display: inline-block;
        }
        .btn-qr:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.1);
        }

        .qr-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 100;
            align-items: center; justify-content: center;
        }
        .qr-overlay.show { display: flex; }
        .qr-box {
            background: white;
            border-radius: 24px;
            padding: 24px 20px 20px;
            text-align: center;
            max-width: 300px; width: 88%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            animation: qrPop 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes qrPop {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        .qr-box h3 {
            font-size: 16px; font-weight: 900;
            color: var(--text-main); margin-bottom: 14px;
        }
        .qr-box img {
            width: 100%; max-width: 220px;
            border-radius: 12px;
            border: 3px solid #e0e0e0;
        }
        .qr-box p {
            font-size: 12px; color: #888;
            margin: 10px 0 16px;
            line-height: 1.6;
        }
        .btn-qr-close {
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 15px; font-weight: 900;
            color: #666; background: #f0f0f0;
            border: none; border-radius: 20px;
            padding: 10px 32px; cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.08);
        }
        .btn-qr-close:active { transform: translateY(2px); }

        .install-banner {
            display: none;
            position: fixed;
            bottom: 12px; left: 12px; right: 12px;
            max-width: 460px; margin: 0 auto;
            background: white;
            border: 3px solid #4ade80;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 14px 16px;
            z-index: 50;
            animation: slideUpBanner 0.3s ease-out;
        }
        @keyframes slideUpBanner {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .install-banner.show { display: block; }
        .install-banner .ib-head {
            font-size: 15px; font-weight: 900; color: var(--text-main);
            margin-bottom: 6px;
        }
        .install-banner .ib-body {
            font-size: 13px; color: #555; line-height: 1.7;
        }
        .install-banner .ib-body strong { color: var(--text-main); font-weight: 700; }
        .install-banner .ib-actions {
            display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end;
        }
        .install-banner .ib-actions button {
            background: #4ade80; color: white; border: none;
            padding: 9px 20px; border-radius: 20px;
            font-family: 'Zen Maru Gothic', sans-serif;
            font-size: 13px; font-weight: 900; cursor: pointer;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }
        .install-banner .ib-dismiss {
            background: transparent !important;
            color: #aaa !important; box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
    </div>
    <div class="meadow"></div>

    <header>
        <h1>運試し！<br>きめようらんど</h1>
        <p class="subtitle">あそびたいのを えらんでね！</p>
        <button class="btn-qr" onclick="document.getElementById('qrOverlay').classList.add('show')">みんなで遊ぼう 📲</button>
    </header>

    <div class="menu-grid">
        <a href="amida.html" class="menu-item yellow">
            <span class="emoji">🎉</span>
            <span class="item-title">あみだくじ</span>
        </a>
        <a href="animal_coin_toss.html" class="menu-item orange">
            <span class="emoji">🪙</span>
            <span class="item-title">どうぶつ<br>コイン表裏</span>
        </a>
    </div>

    <footer>
        <p class="copyright">&copy; きめようらんど</p>
        <p class="copyright">Ver.260504-1.01</p>
    </footer>

    <div class="qr-overlay" id="qrOverlay" onclick="this.classList.remove('show')">
        <div class="qr-box" onclick="event.stopPropagation()">
            <h3>📲 このQRコードをよみとってね！</h3>
            <img src="qr20260416234205503.png" alt="きめようらんど QRコード">
            <p>スマホのカメラでよみとると<br>きめようらんどがひらくよ！</p>
            <button class="btn-qr-close" onclick="document.getElementById('qrOverlay').classList.remove('show')">とじる</button>
        </div>
    </div>

    <div class="install-banner" id="installBanner">
        <div class="ib-head">📲 ホーム画面に追加できるよ！</div>
        <div class="ib-body" id="installBody"></div>
        <div class="ib-actions" id="installActions"></div>
    </div>

    <script>
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                const url = item.getAttribute('href');
                setTimeout(() => { location.href = url; }, 100);
            });
        });

        (function installPrompt() {
            const $banner  = document.getElementById('installBanner');
            const $body    = document.getElementById('installBody');
            const $actions = document.getElementById('installActions');
            let deferredPrompt = null;

            if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone) return;
            if (localStorage.getItem('install-dismissed')) return;

            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

            function makeBtn(text, cls) {
                const btn = document.createElement('button');
                btn.textContent = text;
                if (cls) btn.className = cls;
                return btn;
            }
            function makeDismiss() {
                const btn = makeBtn('あとで', 'ib-dismiss');
                btn.addEventListener('click', () => {
                    $banner.classList.remove('show');
                    localStorage.setItem('install-dismissed', '1');
                });
                return btn;
            }
            function showIOSGuide() {
                $body.innerHTML = '画面下の<strong>共有ボタン（□↑）</strong>をタップして<br><strong>「ホーム画面に追加」</strong>を選んでね！';
                $actions.innerHTML = '';
                $actions.appendChild(makeDismiss());
                $banner.classList.add('show');
            }
            function showAndroidGuide() {
                $body.innerHTML = 'ブラウザの<strong>メニュー（⋮）</strong>から<br><strong>「ホーム画面に追加」</strong>を選んでね！';
                $actions.innerHTML = '';
                $actions.appendChild(makeDismiss());
                $banner.classList.add('show');
            }
            function showInstallButton() {
                $body.innerHTML = 'アプリとしてインストールできるよ！';
                $actions.innerHTML = '';
                const btn = makeBtn('ホーム画面に追加');
                btn.addEventListener('click', async () => {
                    if (!deferredPrompt) return;
                    deferredPrompt.prompt();
                    const result = await deferredPrompt.userChoice;
                    deferredPrompt = null;
                    if (result.outcome === 'accepted') $banner.classList.remove('show');
                });
                $actions.appendChild(makeDismiss());
                $actions.appendChild(btn);
                $banner.classList.add('show');
            }
            if (isIOS) {
                setTimeout(showIOSGuide, 800);
            } else {
                let prompted = false;
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    prompted = true;
                    showInstallButton();
                });
                setTimeout(() => { if (!prompted) showAndroidGuide(); }, 2500);
            }
            window.addEventListener('appinstalled', () => {
                $banner.classList.remove('show');
                localStorage.setItem('install-dismissed', '1');
            });
        })();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
