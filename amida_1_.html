<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あみだくじ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Zen+Maru+Gothic:wght@700&display=swap" rel="stylesheet">
<style>
:root { --bg: #fff5e6; --shadow: rgba(100,80,180,0.15); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: #fff5e6;
  min-height: 100vh;
  padding: 2rem 1rem 4rem;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,160,80,0.12) 0%, transparent 40%),
    radial-gradient(circle at 90% 80%, rgba(255,120,60,0.08) 0%, transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,200,100,0.08) 0%, transparent 60%);
}
h1 {
  font-family: 'Zen Maru Gothic', sans-serif;
  font-size: 2.2rem;
  text-align: center;
  margin-bottom: 0.2rem;
  background: linear-gradient(135deg, #ff6b9d, #a29bfe, #54c7ec);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 2px 4px rgba(162,155,254,0.3));
}
.subtitle { text-align: center; font-size: 12px; color: #b2a8d8; letter-spacing: 0.15em; margin-bottom: 2rem; }
.card { background: white; border-radius: 20px; padding: 1.5rem; max-width: 600px; margin: 0 auto 1.5rem; box-shadow: 0 4px 24px var(--shadow); }
.step-label { font-size: 15px; font-weight: 800; letter-spacing: 0.15em; color: #a29bfe; margin-bottom: 0.8rem; text-transform: uppercase; }
.section-title { font-size: 16px; font-weight: 800; color: #b2a8d8; margin-bottom: 6px; letter-spacing: 0.08em; }
.input-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 0.8rem; }
.input-group { display: flex; flex-direction: column; gap: 4px; }
.input-group label { font-size: 15px; font-weight: 800; color: #a29bfe; }
.input-group input { font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700; padding: 10px 12px; border: 2px solid #e8e0ff; border-radius: 10px; outline: none; color: #5f27cd; width: 100%; transition: border-color 0.2s; }
.input-group input:focus { border-color: #a29bfe; }
.input-group input::placeholder { color: #ccc; font-weight: 400; }
.input-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.input-row label { font-size: 14px; font-weight: 700; color: #6c5ce7; }
input[type=number] { width: 80px; font-family: 'Nunito', sans-serif; font-size: 1.2rem; font-weight: 800; padding: 8px 12px; border: 2.5px solid #d6c9ff; border-radius: 12px; outline: none; color: #5f27cd; text-align: center; }
.btn { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; padding: 10px 22px; border-radius: 100px; border: none; cursor: pointer; transition: all 0.2s; letter-spacing: 0.05em; }
.btn-primary { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; box-shadow: 0 4px 14px rgba(108,92,231,0.35); }
.btn-primary:hover:not(:disabled) { transform: translateY(-2px); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-go { background: linear-gradient(135deg, #ff6b9d, #ff9f43); color: white; font-size: 16px; padding: 12px 32px; box-shadow: 0 4px 18px rgba(255,107,157,0.4); }
.btn-go:hover:not(:disabled) { transform: translateY(-2px); }
.btn-go:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-regen { background: linear-gradient(135deg, #10ac84, #54c7ec); color: white; box-shadow: 0 4px 14px rgba(16,172,132,0.35); }
.btn-regen:hover { transform: translateY(-2px); }
.btn-reset { background: linear-gradient(135deg, #74b9ff, #54c7ec); color: white; box-shadow: 0 4px 14px rgba(84,199,236,0.35); }
.btn-reset:hover { transform: translateY(-2px); }
.action-row { display: flex; gap: 10px; justify-content: center; margin-top: 1rem; flex-wrap: wrap; }
.hint { font-size: 12px; color: #b2a8d8; text-align: center; margin-bottom: 0.8rem; font-weight: 700; }
#amida-wrap { display: none; max-width: 640px; margin: 0 auto; }
#amida-card { background: white; border-radius: 20px; padding: 1rem 0.5rem; box-shadow: 0 4px 24px var(--shadow); margin-bottom: 1rem; position: relative; }
#player-prompt {
  text-align: center;
  padding: 0.8rem 1rem;
  margin-bottom: 0.8rem;
  font-size: 1.1rem;
  font-weight: 800;
  color: #6c5ce7;
  background: linear-gradient(135deg, #e8f8f0, #d4f5e4);
  border-radius: 14px;
  border: 2px solid #b8e8d0;
  display: none;
  letter-spacing: 0.04em;
}
#player-prompt .name-highlight {
  font-size: 1.3rem;
  background: linear-gradient(135deg, #ff6b9d, #a29bfe);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
canvas { display: block; margin: 0 auto; border-radius: 12px; max-width: 100%; height: auto; }
#result-card {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,245,230,0.96);
  border-radius: 20px;
  padding: 1.2rem 1rem;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.5s ease;
  overflow-y: auto;
}
#result-card.visible { opacity: 1; }
#result-card h3 { font-family: 'Zen Maru Gothic', sans-serif; font-size: 1.2rem; color: #6c5ce7; margin-bottom: 1rem; text-align: center; }
.result-table { width: 100%; border-collapse: collapse; }
.result-table th { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: white; padding: 8px 16px; font-size: 13px; font-weight: 800; }
.result-table th:first-child { border-radius: 10px 0 0 0; }
.result-table th:last-child { border-radius: 0 10px 0 0; }
.result-table td { padding: 10px 16px; text-align: center; font-weight: 700; font-size: 16px; border-bottom: 1px solid #f0eaff; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:nth-child(even) td { background: #faf8ff; }
@media (max-width: 480px) {
  h1 { font-size: 1.6rem; }
  .btn { font-size: 12px; padding: 9px 16px; }
  .btn-go { font-size: 14px; padding: 10px 22px; }
  .card { padding: 1rem; }
  .input-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}
</style>
</head>
<body>

<h1>🎉 あみだくじ</h1>
<div class="subtitle">— AMIDA LOTTERY —</div>

<!-- STEP1 -->
<div class="card" id="step1-card">
  <div class="step-label">Step 1 — 参加人数を入力</div>
  <div class="input-row">
    <label>参加人数</label>
    <input type="number" id="num-input" min="2" max="8" value="4" />
    <span style="font-size:13px;color:#b2a8d8;font-weight:700;">人（最大8人）</span>
    <button class="btn btn-primary" id="setup-btn">参加受付 →</button>
  </div>
</div>

<!-- STEP2 -->
<div class="card" id="step2-card" style="display:none;">
  <div class="step-label" style="text-align:center;">Step 2 — 名前とゴールを入力（空欄でもOK）</div>
  <div class="section-title" style="text-align:center;">参加者の名前（空欄ならA,B,C...になるよ・最大4文字）</div>
  <div class="input-grid" id="name-inputs" style="max-width:480px;margin-left:auto;margin-right:auto;"></div>
  <div class="section-title" style="margin-top:1rem;text-align:center;">ゴールの内容（空欄なら1,2,3...になるよ・最大4文字）</div>
  <div class="input-grid" id="goal-inputs" style="max-width:480px;margin-left:auto;margin-right:auto;"></div>
  <div class="action-row">
    <button class="btn btn-go" id="close-btn">参加締め切り 🎯</button>
    <button class="btn" id="clear-btn" style="background:linear-gradient(135deg,#b2bec3,#636e72);color:white;box-shadow:0 4px 14px rgba(99,110,114,0.3);">クリア 🗑️</button>
  </div>
</div>

<!-- STEP3 -->
<div id="amida-wrap">
  <div class="card">
    <div class="step-label">Step 3 — スタートをクリックして割り当て</div>
    <div class="hint" id="hint-text">上のスタート地点をクリックして割り当てよう！</div>
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:0.8rem;">
      <span style="font-size:12px;font-weight:800;color:#b2a8d8;">🐢 おそい</span>
      <input type="range" id="speed-slider" min="1" max="10" value="4" step="1"
        style="width:160px;accent-color:#a29bfe;cursor:pointer;" />
      <span style="font-size:12px;font-weight:800;color:#b2a8d8;">はやい 🐇</span>
    </div>
    <div class="action-row">
      <button class="btn btn-primary" id="ready-btn" disabled>準備OK！ あみだを生成 ✨</button>
      <button class="btn" id="quick-btn" style="background:linear-gradient(135deg,#fd79a8,#e17055);color:white;box-shadow:0 4px 14px rgba(253,121,168,0.4);">簡単スタート準備 ⚡</button>
      <button class="btn btn-regen" id="regen-btn" style="display:none;">再生成 🔀</button>
      <button class="btn btn-go" id="go-btn" style="display:none;">よーいドン！ 🚀</button>
    </div>
  </div>
  <div id="player-prompt"></div>
  <div id="amida-card">
    <canvas id="amida-canvas"></canvas>
    <div id="result-card">
      <h3>🎊 結果発表！</h3>
      <table class="result-table">
        <thead><tr><th>No.</th><th>結果</th><th>参加者</th></tr></thead>
        <tbody id="result-body"></tbody>
      </table>
      <div class="action-row" style="margin-top:1rem;">
        <button class="btn btn-reset" id="reset-btn">もう一度！</button>
        <button class="btn btn-reset" onclick="location.reload()">リセット 🔄</button>
      </div>
    </div>
  </div>
</div>

<script>
const COLORS = ['#ff6b9d','#ff9f43','#54c7ec','#5f27cd','#10ac84','#ee5a24','#0652dd','#c44569'];
const VPAD = 70, HPAD = 50, ROW_H = 50, ROWS = 10, ICON_R = 22;

let N = 4, names = [], goals = [], assignments = [], hbars = [], colX = [];
let canvasW, canvasH, phase = 'assign', animating = false;

const canvas = document.getElementById('amida-canvas');
const ctx = canvas.getContext('2d');

// ===== Web Audio API =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol = 0.3, delay = 0) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ac.currentTime + delay);
  gain.gain.setValueAtTime(vol, ac.currentTime + delay);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + duration);
  osc.start(ac.currentTime + delay);
  osc.stop(ac.currentTime + delay + duration);
}

function playNoise(duration, vol = 0.15) {
  const ac = getAudioCtx();
  const bufSize = ac.sampleRate * duration;
  const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
  const src = ac.createBufferSource();
  const gain = ac.createGain();
  src.buffer = buf;
  src.connect(gain); gain.connect(ac.destination);
  gain.gain.setValueAtTime(vol, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
  src.start(); src.stop(ac.currentTime + duration);
}

function seClick() {
  playTone(600, 'sine', 0.1, 0.25);
  playTone(900, 'sine', 0.08, 0.15, 0.05);
}
function seReady() {
  [261.6, 329.6, 392, 523.3].forEach((f, i) => playTone(f, 'triangle', 0.2, 0.2, i * 0.08));
}
function seGo(callback) {
  playTone(880, 'square', 0.12, 0.2, 0.0);
  playTone(880, 'square', 0.12, 0.2, 0.4);
  playTone(880, 'square', 0.12, 0.2, 0.8);
  playTone(1320, 'sawtooth', 0.25, 0.3, 1.2);
  playNoise(0.15, 0.2);
  setTimeout(callback, 1300);
}
function seCross(col) {
  const freqs = [523, 587, 659, 698, 784, 880, 988, 1047];
  playTone(freqs[col % freqs.length], 'sine', 0.08, 0.18);
}
function seFall() {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.connect(gain); gain.connect(ac.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(600, ac.currentTime);
  osc.frequency.exponentialRampToValueAtTime(150, ac.currentTime + 0.18);
  gain.gain.setValueAtTime(0.2, ac.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
  osc.start(ac.currentTime);
  osc.stop(ac.currentTime + 0.18);
}
function seGoal(idx) {
  const freqs = [523, 659, 784, 880, 988, 1047, 1175, 1319];
  const f = freqs[idx % freqs.length];
  playTone(f, 'sine', 0.12, 0.3);
  playTone(f * 1.5, 'sine', 0.1, 0.2, 0.08);
  playNoise(0.06, 0.1);
}
function seResult() {
  const melody = [
    [523, 0], [523, 0.1], [523, 0.2], [659, 0.3],
    [523, 0.5], [659, 0.6], [784, 0.75]
  ];
  melody.forEach(([f, d]) => playTone(f, 'triangle', 0.25, 0.3, d));
  playTone(392, 'triangle', 0.6, 0.2, 0.3);
}

// STEP1
document.getElementById('setup-btn').addEventListener('click', () => {
  N = Math.max(2, Math.min(8, parseInt(document.getElementById('num-input').value) || 4));
  const defaultNames = 'ABCDEFGH';
  const defaultGoals = ['1','2','3','4','5','6','7','8'];
  const nameWrap = document.getElementById('name-inputs');
  const goalWrap = document.getElementById('goal-inputs');
  nameWrap.innerHTML = ''; goalWrap.innerHTML = '';

  const saved = JSON.parse(localStorage.getItem('amida-settings') || '{}');

  for (let i = 0; i < N; i++) {
    const ng = document.createElement('div'); ng.className = 'input-group';
    ng.innerHTML = `<label>参加者 ${defaultNames[i]}</label><input type="text" maxlength="4" placeholder="${defaultNames[i]}" id="name-${i}" />`;
    nameWrap.appendChild(ng);
    const gg = document.createElement('div'); gg.className = 'input-group';
    gg.innerHTML = `<label>ゴール ${defaultGoals[i]}</label><input type="text" maxlength="4" placeholder="${defaultGoals[i]}" id="goal-${i}" />`;
    goalWrap.appendChild(gg);

    if (saved.names && saved.names[i]) document.getElementById(`name-${i}`).value = saved.names[i];
    if (saved.goals && saved.goals[i]) document.getElementById(`goal-${i}`).value = saved.goals[i];

    document.getElementById(`name-${i}`).addEventListener('input', saveSettings);
    document.getElementById(`goal-${i}`).addEventListener('input', saveSettings);
  }
  document.getElementById('step1-card').style.display = 'none';
  document.getElementById('step2-card').style.display = 'block';
});

function saveSettings() {
  const savedNames = [], savedGoals = [];
  for (let i = 0; i < N; i++) {
    savedNames.push(document.getElementById(`name-${i}`)?.value || '');
    savedGoals.push(document.getElementById(`goal-${i}`)?.value || '');
  }
  localStorage.setItem('amida-settings', JSON.stringify({ names: savedNames, goals: savedGoals }));
}

document.getElementById('clear-btn').addEventListener('click', () => {
  localStorage.removeItem('amida-settings');
  for (let i = 0; i < N; i++) {
    document.getElementById(`name-${i}`).value = '';
    document.getElementById(`goal-${i}`).value = '';
  }
});

// STEP2
document.getElementById('close-btn').addEventListener('click', () => {
  const defaultNames = 'ABCDEFGH';
  const defaultGoals = ['1','2','3','4','5','6','7','8'];
  names = []; goals = [];
  for (let i = 0; i < N; i++) {
    names.push(document.getElementById(`name-${i}`).value.trim() || defaultNames[i]);
    goals.push(document.getElementById(`goal-${i}`).value.trim() || defaultGoals[i]);
  }
  assignments = new Array(N).fill(null);
  hbars = []; phase = 'assign'; animating = false;

  const maxW = Math.min(580, (document.getElementById('amida-card').clientWidth || window.innerWidth) - 16);
  canvasW = Math.min(maxW, Math.max(N * 90 + HPAD * 2, 300));
  canvasH = VPAD * 2 + ROW_H * ROWS + 80;
  canvas.width = canvasW; canvas.height = canvasH;
  const span = canvasW - HPAD * 2;
  colX = [];
  for (let i = 0; i < N; i++) colX.push(HPAD + (span / (N - 1)) * i);

  document.getElementById('step2-card').style.display = 'none';
  document.getElementById('amida-wrap').style.display = 'block';
  document.getElementById('go-btn').style.display = 'none';
  document.getElementById('regen-btn').style.display = 'none';
  document.getElementById('ready-btn').style.display = 'inline-block';
  document.getElementById('ready-btn').disabled = true;
  const rc2 = document.getElementById('result-card');
  rc2.classList.remove('visible');
  rc2.style.display = 'none';

  const pp = document.getElementById('player-prompt');
  pp.innerHTML = `<span class="name-highlight">${names[0]}</span>さん<br>スタート地点を選んでください`;
  pp.style.display = 'block';
  document.getElementById('hint-text').textContent = `✨ ${names[0]}さん スタート地点を選んでください`;

  drawAmida();
  canvas.addEventListener('click', onCanvasClick);
});

function onCanvasClick(e) {
  if (phase !== 'assign') return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top) * (canvas.height / rect.height);
  const topY = VPAD * 0.5;
  for (let i = 0; i < N; i++) {
    if (Math.abs(mx - colX[i]) < ICON_R + 6 && Math.abs(my - topY) < ICON_R + 6) {
      if (assignments[i] !== null) {
        const released = assignments[i];
        assignments[i] = null;
        for (let j = 0; j < N; j++) {
          if (assignments[j] !== null && assignments[j] > released) assignments[j]--;
        }
      } else {
        const used = assignments.filter(a => a !== null).length;
        if (used < N) assignments[i] = used;
      }
      updateHint(); checkReady(); drawAmida();
      seClick();
      return;
    }
  }
}

function updateHint() {
  const filled = assignments.filter(a => a !== null).length;
  const prompt = document.getElementById('player-prompt');
  if (filled === N) {
    document.getElementById('hint-text').textContent = '全員割り当て完了！「準備OK」を押してあみだを生成しよう！';
    prompt.style.display = 'none';
  } else {
    const nextName = names[filled];
    document.getElementById('hint-text').textContent = `✨ ${nextName}さん スタート地点を選んでください`;
    prompt.innerHTML = `<span class="name-highlight">${nextName}</span>さん<br>スタート地点を選んでください`;
    prompt.style.display = 'block';
  }
}

function checkReady() {
  document.getElementById('ready-btn').disabled = assignments.filter(a => a !== null).length < N;
}

document.getElementById('ready-btn').addEventListener('click', () => {
  if (phase !== 'assign') return;
  generateHbars(); phase = 'ready';
  seReady();
  document.getElementById('ready-btn').style.display = 'none';
  document.getElementById('regen-btn').style.display = 'inline-block';
  document.getElementById('go-btn').style.display = 'inline-block';
  document.getElementById('hint-text').textContent = '気に入らなければ「再生成」、よければ「よーいドン！」！';
  drawAmida();
});

document.getElementById('regen-btn').addEventListener('click', () => {
  if (phase !== 'ready') return;
  generateHbars(); drawAmida();
});

document.getElementById('quick-btn').addEventListener('click', () => {
  const shuffled = [...Array(N).keys()].sort(() => Math.random() - 0.5);
  assignments = new Array(N).fill(null);
  shuffled.forEach((personIdx, col) => { assignments[col] = personIdx; });

  generateHbars(); phase = 'ready';
  document.getElementById('ready-btn').style.display = 'none';
  document.getElementById('quick-btn').style.display = 'none';
  document.getElementById('regen-btn').style.display = 'inline-block';
  document.getElementById('go-btn').style.display = 'inline-block';
  document.getElementById('go-btn').disabled = false;
  document.getElementById('regen-btn').disabled = false;
  document.getElementById('player-prompt').style.display = 'none';
  document.getElementById('hint-text').textContent = '気に入らなければ「再生成」、よければ「よーいドン！」！';
  drawAmida();
});

function generateHbars() {
  let attempts = 0;
  do {
    hbars = [];
    for (let row = 0; row < ROWS; row++) {
      let used = new Set();
      const shuffle = [...Array(N - 1).keys()].sort(() => Math.random() - 0.5);
      for (const col of shuffle) {
        if (!used.has(col) && !used.has(col - 1) && !used.has(col + 1) && Math.random() < 0.5) {
          hbars.push({ col, row }); used.add(col); used.add(col + 1);
        }
      }
    }
    attempts++;
  } while (!isValidHbars() && attempts < 100);
}

function isValidHbars() {
  for (let i = 0; i < N; i++) {
    const connected = hbars.some(h => h.col === i || h.col === i - 1);
    if (!connected) return false;
  }
  return true;
}

document.getElementById('go-btn').addEventListener('click', () => {
  if (phase !== 'ready' || animating) return;
  phase = 'running'; animating = true;
  document.getElementById('go-btn').disabled = true;
  document.getElementById('regen-btn').disabled = true;
  seGo(() => animateAll(calcPaths()));
});

function calcPaths() {
  const paths = [];
  for (let i = 0; i < N; i++) {
    const personIdx = assignments[i];
    if (personIdx === null) continue;
    let col = i;
    const path = [{ x: colX[col], y: VPAD * 0.5 }];
    for (let row = 0; row < ROWS; row++) {
      const y0 = VPAD + row * ROW_H;
      path.push({ x: colX[col], y: y0 });
      const right = hbars.find(h => h.col === col && h.row === row);
      const left  = hbars.find(h => h.col === col - 1 && h.row === row);
      if (right)      { path.push({ x: colX[col + 1], y: y0 }); col++; }
      else if (left)  { path.push({ x: colX[col - 1], y: y0 }); col--; }
    }
    path.push({ x: colX[col], y: VPAD + ROWS * ROW_H });
    paths[personIdx] = { points: path, endCol: col };
  }
  return paths;
}

function animateAll(paths) {
  const SPEED = parseFloat(document.getElementById('speed-slider').value) * 1.5;
  const states = paths.map(p => {
    if (!p) return null;
    const dists = [0];
    for (let i = 1; i < p.points.length; i++) {
      const dx = p.points[i].x - p.points[i-1].x, dy = p.points[i].y - p.points[i-1].y;
      dists.push(dists[dists.length-1] + Math.sqrt(dx*dx + dy*dy));
    }
    return { p, dists, total: dists[dists.length-1], traveled: 0, done: false, lastSeg: 0 };
  });

  function getPos(s, traveled) {
    for (let i = 1; i < s.dists.length; i++) {
      if (traveled <= s.dists[i]) {
        const seg = s.dists[i] - s.dists[i-1];
        const t = seg > 0 ? (traveled - s.dists[i-1]) / seg : 1;
        return { x: s.p.points[i-1].x + (s.p.points[i].x - s.p.points[i-1].x) * t,
                 y: s.p.points[i-1].y + (s.p.points[i].y - s.p.points[i-1].y) * t, seg: i - 1 };
      }
    }
    return { ...s.p.points[s.p.points.length-1], seg: s.dists.length - 1 };
  }

  function isHorizontalSeg(s, segIdx) {
    if (segIdx < 0 || segIdx >= s.p.points.length - 1) return false;
    const dy = Math.abs(s.p.points[segIdx + 1].y - s.p.points[segIdx].y);
    const dx = Math.abs(s.p.points[segIdx + 1].x - s.p.points[segIdx].x);
    return dx > dy;
  }

  function frame() {
    drawAmida();
    let allDone = true;
    for (let idx = 0; idx < states.length; idx++) {
      const s = states[idx];
      if (!s) continue;
      if (!s.done) {
        s.traveled = Math.min(s.traveled + SPEED, s.total);
        if (s.traveled >= s.total) { s.done = true; seGoal(idx); } else allDone = false;
      }
      const pos = getPos(s, s.traveled);
      if (pos.seg !== s.lastSeg && isHorizontalSeg(s, pos.seg)) {
        seCross(idx);
      }
      if (pos.seg !== s.lastSeg && !isHorizontalSeg(s, pos.seg) && pos.seg > 0) {
        seFall();
      }
      s.lastSeg = pos.seg;
      drawIcon(pos.x, pos.y, names[idx], COLORS[idx % COLORS.length]);
    }
    if (!allDone) requestAnimationFrame(frame);
    else { animating = false; phase = 'done'; seResult(); setTimeout(() => showResult(paths), 800); }
  }
  requestAnimationFrame(frame);
}

function drawAmida() {
  ctx.clearRect(0, 0, canvasW, canvasH);
  const topY = VPAD * 0.5, bottomY = VPAD + ROWS * ROW_H;

  for (let i = 0; i < N; i++) {
    ctx.beginPath(); ctx.moveTo(colX[i], topY); ctx.lineTo(colX[i], bottomY);
    ctx.strokeStyle = '#d6c9ff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
  }
  for (const { col, row } of hbars) {
    const y = VPAD + row * ROW_H;
    ctx.beginPath(); ctx.moveTo(colX[col], y); ctx.lineTo(colX[col+1], y);
    ctx.strokeStyle = '#a29bfe'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
  }

  for (let i = 0; i < N; i++) {
    const color = COLORS[i % COLORS.length];
    ctx.font = 'bold 18px Nunito';
    const bw = Math.max(50, ctx.measureText(goals[i]).width + 28);
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.roundRect(colX[i] - bw/2, bottomY + 32, bw, 36, 10); ctx.fill();
    ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(goals[i], colX[i], bottomY + 50);
  }

  if (phase === 'assign' || phase === 'ready') {
    for (let i = 0; i < N; i++) {
      const personIdx = assignments[i];
      if (personIdx !== null) {
        drawIcon(colX[i], topY, names[personIdx], COLORS[personIdx % COLORS.length]);
      } else if (phase === 'assign') {
        ctx.beginPath(); ctx.arc(colX[i], topY, ICON_R, 0, Math.PI * 2);
        ctx.fillStyle = '#f0eaff'; ctx.fill();
        ctx.strokeStyle = '#d6c9ff'; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.fillStyle = '#c8b8f0'; ctx.font = 'bold 13px Nunito';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText('?', colX[i], topY);
      }
    }
  }
}

function drawIcon(x, y, label, color) {
  ctx.beginPath(); ctx.arc(x, y + 3, ICON_R, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.12)'; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, ICON_R, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
  const len = (label || '').length;
  const fontSize = len <= 2 ? 14 : len === 3 ? 11 : 9;
  ctx.fillStyle = 'white'; ctx.font = `bold ${fontSize}px Nunito`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

function showResult(paths) {
  const rows = [];
  for (let idx = 0; idx < N; idx++) {
    const p = paths[idx];
    if (!p) continue;
    rows.push({ personIdx: idx, endCol: p.endCol });
  }
  rows.sort((a, b) => a.endCol - b.endCol);

  const tbody = document.getElementById('result-body');
  tbody.innerHTML = '';
  rows.forEach(({ personIdx, endCol }, i) => {
    const color = COLORS[personIdx % COLORS.length];
    const goalColor = COLORS[endCol % COLORS.length];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-size:18px;font-weight:800;color:#b2a8d8;">${i + 1}</td>
      <td><span style="display:inline-flex;align-items:center;justify-content:center;min-width:52px;height:42px;padding:0 16px;border-radius:20px;background:${goalColor};color:white;font-weight:800;font-size:18px;">${goals[endCol]}</span></td>
      <td><span style="display:inline-flex;align-items:center;justify-content:center;min-width:52px;height:42px;padding:0 16px;border-radius:20px;background:${color};color:white;font-weight:800;font-size:18px;">${names[personIdx]}</span></td>
    `;
    tbody.appendChild(tr);
  });
  const rc = document.getElementById('result-card');
  rc.style.display = 'block';
  requestAnimationFrame(() => rc.classList.add('visible'));
}

document.getElementById('reset-btn').addEventListener('click', () => {
  assignments = new Array(N).fill(null);
  hbars = []; phase = 'assign'; animating = false;

  const rc2 = document.getElementById('result-card');
  rc2.classList.remove('visible');
  rc2.style.display = 'none';
  document.getElementById('go-btn').style.display = 'none';
  document.getElementById('regen-btn').style.display = 'none';
  document.getElementById('ready-btn').style.display = 'inline-block';
  document.getElementById('ready-btn').disabled = true;
  document.getElementById('quick-btn').style.display = 'inline-block';
  document.getElementById('go-btn').disabled = false;
  document.getElementById('regen-btn').disabled = false;
  document.getElementById('hint-text').textContent = '上のスタート地点をクリックして割り当てよう！';

  const pp = document.getElementById('player-prompt');
  pp.innerHTML = `<span class="name-highlight">${names[0]}</span>さん<br>スタート地点を選んでください`;
  pp.style.display = 'block';

  drawAmida();
});
</script>
